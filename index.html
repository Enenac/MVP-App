<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MVP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f1e;--accent:#a78bfa;--ora:#fb923c;--pnk:#f472b6;--grn:#34d399;--blu:#60a5fa;--text:#e8e8f8;--text2:#6b7099;--text3:#9a9dc0;--bord:rgba(255,255,255,.08);--bord2:rgba(255,255,255,.12);--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.08)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb1{width:400px;height:400px;top:-100px;left:-80px;background:radial-gradient(circle,rgba(120,80,255,.3) 0%,transparent 70%)}
.orb2{width:320px;height:320px;bottom:60px;right:-60px;background:radial-gradient(circle,rgba(255,100,60,.22) 0%,transparent 70%)}
#loading{position:fixed;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:12px;color:var(--text2);flex-direction:column;gap:8px}
.spin{width:24px;height:24px;border:2px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#auth-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;backdrop-filter:blur(24px);padding:28px 24px;width:100%;max-width:320px}
.auth-logo{font-size:22px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px;letter-spacing:2px}
.auth-sub{font-size:11px;color:var(--text2);text-align:center;margin-bottom:22px}
.auth-tabs{display:flex;background:rgba(255,255,255,.04);border-radius:9px;padding:3px;margin-bottom:18px}
.auth-tab{flex:1;padding:6px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.auth-tab.act{background:rgba(167,139,250,.2);color:#c4b5fd}
.auth-inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:9px 12px;border-radius:10px;font-size:13px;outline:none;margin-bottom:10px;font-family:inherit}
.auth-inp:focus{border-color:rgba(167,139,250,.5)}
.auth-inp::placeholder{color:var(--text2)}
.auth-btn{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(167,139,250,.4);background:rgba(139,92,246,.2);color:#c4b5fd;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.auth-btn:hover{background:rgba(139,92,246,.35);color:#fff}
.auth-btn:disabled{opacity:.5;cursor:default}
.auth-msg{font-size:11px;text-align:center;margin-top:8px;min-height:16px}
.layout{display:flex;height:100vh;height:100dvh;position:relative;z-index:1}
@media(max-width:600px){.layout{padding-bottom:60px}}
.sidebar{width:64px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;background:rgba(255,255,255,.03);border-right:1px solid var(--bord);backdrop-filter:blur(20px)}
@media(max-width:600px){.sidebar{display:none}}
.sb-logo{font-size:12px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;letter-spacing:1px}
.sb-spacer{flex:1}
.sb-item{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;color:var(--text2);border:1px solid transparent}
.sb-item:hover{background:var(--glass2);color:var(--text3)}
.sb-item.active{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.25);color:var(--accent)}
.sb-logout{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);border:1px solid var(--bord);background:transparent;margin-top:6px}
.sb-logout:hover{color:#f87171;border-color:#f87171}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(13,15,30,.94);border-top:1px solid var(--bord);backdrop-filter:blur(24px);z-index:100;align-items:center;justify-content:space-around;padding:0 4px}
@media(max-width:600px){.bottom-nav{display:flex}}
.bn-item{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);gap:3px;border:none;background:transparent;padding:0;font-family:inherit}
.bn-item.active{color:var(--accent)}
.bn-label{font-size:9px}
.main{flex:1;overflow-y:auto;min-width:0;padding:14px;-webkit-overflow-scrolling:touch}
@media(max-width:600px){.main{padding:10px}}
.section{display:none}.section.active{display:block}
.g{background:var(--glass);border:1px solid var(--bord);border-radius:14px;backdrop-filter:blur(20px)}
.p12{padding:12px}.p14{padding:14px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.slabel{font-size:9px;color:var(--text2);letter-spacing:.8px;margin-bottom:10px}
.inp{background:var(--glass);border:1px solid var(--bord);color:var(--text);padding:7px 10px;border-radius:9px;font-size:13px;outline:none;width:100%;font-family:inherit}
.inp:focus{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.06)}
.inp::placeholder{color:var(--text2)}
.inp-sm{font-size:11px;padding:5px 8px}
.lbl{font-size:10px;color:var(--text2);margin-bottom:3px}
.btn-pri{padding:7px 14px;border-radius:9px;border:1px solid rgba(167,139,250,.4);background:rgba(139,92,246,.15);color:#c4b5fd;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-pri:hover{background:rgba(139,92,246,.3);color:#fff}
.btn-ghost{padding:5px 10px;border-radius:7px;border:1px solid var(--bord2);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit}
.btn-ghost:hover{background:var(--glass2);color:var(--text)}
.chip-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:4px 10px;border-radius:14px;border:1px solid var(--bord2);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit}
.chip.act{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.35);color:#c4b5fd}
.row{display:flex;gap:6px}
.pill{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;border:1px solid}
.divider{height:1px;background:var(--bord);margin:10px 0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
@media(max-width:480px){.two-col{grid-template-columns:1fr}}
.empty-state{color:var(--text2);font-size:12px;padding:8px 0 12px}
.months-wrap{display:flex;gap:12px;flex-wrap:wrap}
.month-block{}
.mlbl{font-size:9px;color:var(--text2);margin-bottom:4px;text-align:center}
.dow-row{display:grid;grid-template-columns:repeat(7,18px);gap:2px;margin-bottom:2px}
.dlbl{width:18px;text-align:center;font-size:8px;color:var(--text2)}
.dgrid{display:grid;grid-template-columns:repeat(7,18px);gap:2px}
.dc{width:18px;height:18px;border-radius:3px;cursor:pointer;background:var(--glass);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--text2)}
.dc.today{border-color:var(--ora)!important}
.dc.fut{opacity:.18;cursor:default}
.dc.emp{background:transparent;border-color:transparent;cursor:default}
.s80{background:rgba(139,92,246,.38)!important;border-color:rgba(167,139,250,.55)!important;color:#c4b5fd}
.s60{background:rgba(109,40,217,.28)!important;border-color:rgba(139,92,246,.42)!important;color:#a78bfa}
.s40{background:rgba(219,39,119,.22)!important;border-color:rgba(236,72,153,.38)!important;color:#f0abcb}
.s20{background:rgba(234,88,12,.22)!important;border-color:rgba(251,146,60,.38)!important;color:#fed7aa}
.s0{background:rgba(185,28,28,.22)!important;border-color:rgba(239,68,68,.32)!important;color:#fca5a5}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.li{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text2)}
.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.dmodal{background:var(--glass2);border:1px solid var(--bord2);border-radius:14px;padding:14px;max-width:280px;margin-top:10px}
.dm-date{font-size:9px;color:var(--text2);margin-bottom:2px}
.dm-title{font-size:16px;font-weight:600;margin-bottom:14px}
.cat-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.cat-lbl{font-size:12px;width:60px;flex-shrink:0}
.cat-inp{width:52px;background:var(--glass);border:1px solid var(--bord);color:var(--text);padding:5px 6px;border-radius:7px;font-size:13px;text-align:center;outline:none;font-family:inherit}
.cat-inp:focus{border-color:rgba(167,139,250,.5)}
.avg-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:9px;background:var(--glass);border:1px solid var(--bord);margin:12px 0}
.avg-val{font-size:20px;font-weight:600}
.habit-block{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bord)}
.habit-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hname{font-size:13px;font-weight:500}
.hpct{font-size:11px;color:var(--grn)}
.hdel{background:transparent;border:1px solid var(--bord);color:var(--text2);padding:2px 7px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}
.hdel:hover{color:#f87171;border-color:#f87171}
.hmonths{display:flex;gap:12px;flex-wrap:wrap}
.bc-spent{font-size:24px;font-weight:600}
.bc-bar{height:3px;border-radius:2px;background:var(--bord);overflow:hidden;margin:7px 0 4px}
.bc-fill{height:100%;border-radius:2px;transition:.5s}
.fc-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;background:var(--glass);border:1px solid var(--bord);margin-bottom:5px}
.fc-name{flex:1;font-size:12px}
.fc-amt{font-size:11px;font-weight:500;color:var(--accent)}
.fc-del{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:0 2px}
.fc-del:hover{color:#f87171}
.de-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.de-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.de-name{font-size:12px;color:var(--text3);width:72px;flex-shrink:0}
.de-inp{width:70px;background:var(--glass);border:1px solid var(--bord);color:var(--text);padding:4px 7px;border-radius:6px;font-size:12px;text-align:right;outline:none;font-family:inherit}
.de-inp:focus{border-color:rgba(167,139,250,.4)}
canvas{display:block;width:100%!important}
.goal-card{background:var(--glass);border:1px solid var(--bord);border-radius:12px;padding:12px;margin-bottom:8px}
.goal-card.gc-done{border-color:rgba(52,211,153,.22)}
.goal-card.gc-over{border-color:rgba(248,113,113,.22)}
.gc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.gc-title{font-size:13px;font-weight:500;flex:1;margin-right:6px;line-height:1.3}
.gc-del-btn{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:0;line-height:1}
.gc-del-btn:hover{color:#f87171}
.gc-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.gc-bar{height:3px;border-radius:2px;background:var(--bord);overflow:hidden;margin-bottom:6px}
.gc-bar-fill{height:100%;border-radius:2px;transition:.4s}
.gc-tasks-wrap{border-top:1px solid var(--bord);padding-top:8px;margin-top:6px}
.gc-task{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.tcheck{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tcheck.on{background:rgba(167,139,250,.3);border-color:var(--accent)}
.ttext{flex:1;font-size:12px;color:var(--text3)}
.ttext.done{text-decoration:line-through;color:var(--text2)}
.tdel{background:transparent;border:none;color:rgba(255,255,255,.15);cursor:pointer;font-size:12px;padding:0}
.tdel:hover{color:#f87171}
.todo-cols{display:grid;grid-template-columns:1fr 290px;gap:8px;align-items:start}
@media(max-width:700px){.todo-cols{grid-template-columns:1fr}}
.task-item{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:9px;background:var(--glass);border:1px solid var(--bord);margin-bottom:5px}
.task-item.done-item{opacity:.4}
.t-check{width:15px;height:15px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.t-check.on{background:rgba(167,139,250,.3);border-color:var(--accent)}
.t-text{flex:1;font-size:13px;color:var(--text);line-height:1.3}
.t-text.done{text-decoration:line-through;color:var(--text2)}
.t-date{font-size:10px;color:var(--text2);flex-shrink:0}
.t-date.ov{color:#f87171}.t-date.td{color:var(--ora)}
.t-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.t-del{background:transparent;border:none;color:rgba(255,255,255,.12);cursor:pointer;font-size:13px;padding:0 2px}
.t-del:hover{color:#f87171}
.tg-label{font-size:9px;color:var(--text2);letter-spacing:.6px;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
.tg-label::after{content:"";flex:1;height:1px;background:var(--bord)}
.shop-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;background:var(--glass);border:1px solid var(--bord);margin-bottom:4px}
.shop-item.bought{opacity:.4}
.s-check{width:15px;height:15px;border-radius:4px;border:1px solid rgba(52,211,153,.3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.s-check.on{background:rgba(52,211,153,.2);border-color:var(--grn)}
.s-name{flex:1;font-size:13px}
.s-qty{font-size:10px;color:var(--text2)}
.s-del{background:transparent;border:none;color:rgba(255,255,255,.12);cursor:pointer;font-size:13px;padding:0 2px}
.s-del:hover{color:#f87171}
.stat-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.sm{background:var(--glass);border:1px solid var(--bord);border-radius:10px;padding:10px;text-align:center}
.sm-n{font-size:18px;font-weight:600}
.sm-l{font-size:9px;color:var(--text2);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-track{flex:1;height:2px;border-radius:2px;background:var(--bord)}
.bar-fill{height:100%;border-radius:2px;transition:.5s}
.bar-val{font-size:11px;font-weight:500;width:26px;text-align:right}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div id="loading"><div class="spin"></div><span>Загрузка...</span></div>
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">MVP</div>
    <div class="auth-sub">Планирование и контроль жизни</div>
    <div class="auth-tabs">
      <button class="auth-tab act" onclick="setAM('login',this)">Войти</button>
      <button class="auth-tab" onclick="setAM('signup',this)">Регистрация</button>
    </div>
    <input class="auth-inp" type="email" id="ae" placeholder="Email">
    <input class="auth-inp" type="password" id="ap" placeholder="Пароль">
    <button class="auth-btn" id="ab" onclick="doAuth()">Войти</button>
    <div class="auth-msg" id="am"></div>
  </div>
</div>
<div id="app" style="display:none">
<div class="layout">
  <div class="sidebar">
    <div class="sb-logo">M</div>
    <div class="sb-item active" id="sb-days" onclick="sw('days')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
    <div class="sb-item" id="sb-habits" onclick="sw('habits')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
    <div class="sb-item" id="sb-finance" onclick="sw('finance')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
    <div class="sb-item" id="sb-goals" onclick="sw('goals')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
    <div class="sb-item" id="sb-todo" onclick="sw('todo')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3,6 4,7 6,5"/><polyline points="3,12 4,13 6,11"/><polyline points="3,18 4,19 6,17"/></svg></div>
    <div class="sb-item" id="sb-stats" onclick="sw('stats')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
    <div class="sb-spacer"></div>
    <button class="sb-logout" onclick="doLogout()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
  <div class="main">
    <div class="section active" id="tab-days">
      <div class="chip-row">
        <button class="chip act" onclick="setPeriod(3,this)">3 мес</button>
        <button class="chip" onclick="setPeriod(6,this)">6 мес</button>
        <button class="chip" onclick="setPeriod(12,this)">12 мес</button>
      </div>
      <div class="g p12 mb8">
        <div class="months-wrap" id="life-grid"></div>
        <div class="legend">
          <span class="li"><span class="ld" style="background:rgba(139,92,246,.38);border:1px solid rgba(167,139,250,.55)"></span>&ge;80%</span>
          <span class="li"><span class="ld" style="background:rgba(109,40,217,.28);border:1px solid rgba(139,92,246,.42)"></span>60-79</span>
          <span class="li"><span class="ld" style="background:rgba(219,39,119,.22);border:1px solid rgba(236,72,153,.38)"></span>40-59</span>
          <span class="li"><span class="ld" style="background:rgba(234,88,12,.22);border:1px solid rgba(251,146,60,.38)"></span>20-39</span>
          <span class="li"><span class="ld" style="background:rgba(185,28,28,.22);border:1px solid rgba(239,68,68,.32)"></span>&lt;20%</span>
        </div>
      </div>
      <div id="day-modal-area"></div>
    </div>
    <div class="section" id="tab-habits">
      <div class="g p14 mb8">
        <div class="slabel">ПРИВЫЧКИ</div>
        <div id="habits-list"></div>
        <div class="divider"></div>
        <div class="row"><input class="inp" id="new-habit" placeholder="Новая привычка..."><button class="btn-pri" onclick="addHabit()">+</button></div>
      </div>
    </div>

function setAM(m,btn){
  authMode=m;

async function doAuth(){
  var email=document.getElementById('ae').value.trim();
  var pass=document.getElementById('ap').value;
  var msg=document.getElementById('am');
  var btn=document.getElementById('ab');
  if(!email||!pass){msg.style.color='#f87171';msg.textContent='Введи email и пароль';return;}
  btn.disabled=true; btn.textContent='...'; msg.textContent='';
  try{
    var res;
    if(authMode==='login'){
      res=await sb.auth.signInWithPassword({email:email,password:pass});
    }else{
      res=await sb.auth.signUp({email:email,password:pass});
    }
    if(res.error) throw res.error;
    if(authMode==='signup'&&!res.data.session){
      msg.style.color='#34d399';
      msg.textContent='Проверь email — нужно подтвердить аккаунт';
      btn.disabled=false;
      btn.textContent='Зарегистрироваться';

    msg.style.color='#f87171';

// DAYS

  selPeriod=m;
  document.querySelectorAll('#tab-days .chip').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  renderGrid();

function scCls(a){
  if(a===null) return '';
  if(a>=80) return 's80';
  if(a>=60) return 's60';
  if(a>=40) return 's40';
  if(a>=20) return 's20';
  return 's0';
}
function avgClr(a){
  if(a>=80) return '#a78bfa';
  if(a>=60) return '#818cf8';
  if(a>=40) return '#f472b6';
  if(a>=20) return '#fb923c';
  return '#f87171';
}
function calcAvg(dd){
  if(!dd||!dd.cats) return null;
  var v=CATS_DAY.map(function(c){return Number(dd.cats[c.id])||0;});
  return Math.round(v.reduce(function(a,b){return a+b;},0)/v.length);
}
function renderGrid(){
  var g=document.getElementById('life-grid');
  if(!g) return;
  g.innerHTML='';
  var td=today();
  var start=new Date();
  start.setDate(1);
  for(var mi=0;mi<selPeriod;mi++){
    var mDate=new Date(start.getFullYear(),start.getMonth()+mi,1);
    var bl=document.createElement('div');
    bl.className='month-block';
    var lb=document.createElement('div');
    lb.className='mlbl';
    lb.textContent=MR[mDate.getMonth()]+' '+mDate.getFullYear().toString().slice(2);
    bl.appendChild(lb);
    var dr=document.createElement('div');
    dr.className='dow-row';
    DOW.forEach(function(d){
      var s=document.createElement('div');
      s.className='dlbl';
      s.textContent=d;
      dr.appendChild(s);
    });
    bl.appendChild(dr);
    var gr=document.createElement('div');
    gr.className='dgrid';
    var fd=(mDate.getDay()+6)%7;
    var dim=new Date(mDate.getFullYear(),mDate.getMonth()+1,0).getDate();
    for(var e=0;e<fd;e++){
      var em=document.createElement('div');
      em.className='dc emp';
      gr.appendChild(em);
    }
    for(var d=1;d<=dim;d++){
      var key=toKey(new Date(mDate.getFullYear(),mDate.getMonth(),d));
      var cell=document.createElement('div');
      cell.className='dc';
      cell.textContent=d;
      var avg=calcAvg(cache.days[key]);
      if(avg!==null) cell.classList.add(scCls(avg));
      if(key===td) cell.classList.add('today');
      else if(key>td) cell.classList.add('fut');
      if(key<=td){
        (function(k,dy,mo,yr){
          cell.onclick=function(){openDayModal(k,dy,mo,yr);};
        })(key,d,mDate.getMonth(),mDate.getFullYear());
      }
      gr.appendChild(cell);
    }
    bl.appendChild(gr);
    g.appendChild(bl);
  }
}

  if(!cache.habits.length){el.innerHTML='<div class="empty-state">Нет привычек</div>';return;}
  var td=today();
  var start=new Date();
  start.setDate(1);
  cache.habits.forEach(function(h,hi){
    var now=new Date();
    var dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    var logs=cache.habitLogs[h.id]||{};
    var done=0, past=0;
    for(var d=1;d<=dim;d++){
      var key=toKey(new Date(now.getFullYear(),now.getMonth(),d));
      if(key<=td){past++;if(logs[key]&&logs[key].done)done++;}
    }
    var pct=past?Math.round(done/past*100):0;
    var item=document.createElement('div');
    item.className='habit-block';
    var mHtml='<div class="hmonths">';
    for(var mi=0;mi<selPeriod;mi++){
      var mDate=new Date(start.getFullYear(),start.getMonth()+mi,1);
      var mDim=new Date(mDate.getFullYear(),mDate.getMonth()+1,0).getDate();
      var fd=(mDate.getDay()+6)%7;
      mHtml+='<div class="month-block">';
      mHtml+='<div class="mlbl">'+MR[mDate.getMonth()]+' '+mDate.getFullYear().toString().slice(2)+'</div>';
      mHtml+='<div class="dow-row">'+DOW.map(function(d){return '<div class="dlbl">'+d+'</div>';}).join('')+'</div>';
      mHtml+='<div class="dgrid">';
      for(var e=0;e<fd;e++) mHtml+='<div class="dc emp"></div>';
      for(var dd=1;dd<=mDim;dd++){
        var k=toKey(new Date(mDate.getFullYear(),mDate.getMonth(),dd));
        var isDone=!!(logs[k]&&logs[k].done);
        var isTd=k===td;
        var isFut=k>td;

function drawChart(){
  var canvas=document.getElementById('exp-chart');
  if(!canvas) return;
  var w=canvas.parentElement.offsetWidth||240;
  canvas.width=w; canvas.height=95;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,95);
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  var dim=new Date(y,m+1,0).getDate(), days=[];
  for(var d=1;d<=dim;d++){
    var key=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var ec=cache.expenses[key]&&cache.expenses[key].cats;
    var t=ec?EXP_CATS.reduce(function(s,c){return s+(Number(ec[c.id])||0);},0):0;
    days.push({d:d,t:t,key:key});
  }
  var maxV=Math.max.apply(null,days.map(function(d){return d.t;}));
  maxV=Math.max(maxV,1);
  var padB=14, chartH=95-padB;
  var barW=Math.max(2,(w-6)/dim-1.2);
  var td=today();
  days.forEach(function(day,i){
    var x=3+i*((w-6)/dim);
    var bh=day.t>0?(day.t/maxV)*chartH:0;
    ctx.fillStyle=day.key===td?'rgba(167,139,250,.85)':day.t>0?'rgba(167,139,250,.38)':'rgba(255,255,255,.04)';
    ctx.beginPath();
    ctx.roundRect(x,chartH-bh,barW,Math.max(bh,2),2);
    ctx.fill();
    if(day.d===1||day.d%7===0){
      ctx.fillStyle='rgba(255,255,255,.2)';
      ctx.font='7px system-ui';
      ctx.fillText(day.d,x,95-2);
    }
  });
  var leg=document.getElementById('chart-legend');
  if(leg){
    var tot=days.reduce(function(s,d){return s+d.t;},0);
    var avgD=days.filter(function(d){return d.t>0;});
    leg.innerHTML='<span style="font-size:10px;color:rgba(255,255,255,.4)">Итого: '+Math.round(tot).toLocaleString()+'</span>'+
      (avgD.length?'<span style="font-size:10px;color:rgba(255,255,255,.25)"> Ср/день: '+Math.round(tot/avgD.length).toLocaleString()+'</span>':'');
  }
}

  var auto=g.tasks&&g.tasks.length?Math.round(g.tasks.filter(function(t){return t.done;}).length/g.tasks.length*100):0;
  return (g.tasks&&g.tasks.length)?(g.manual_pct!==undefined?Math.round((g.manual_pct+auto)/2):auto):(g.manual_pct||0);

    div.className='shop-item'+(item.bought?' bought':'');
    div.innerHTML='<div class="s-check'+(item.bought?' on':'')+'" onclick="toggleShop(''+item.id+'')">'+(item.bought?chk('#34d399'):'')+'</div>'+
      '<span class="s-name">'+item.name+'</span>'+
      (item.qty?'<span class="s-qty">'+item.qty+'</span>':'')+
      '<button class="s-del" onclick="delShop(''+item.id+'')">x</button>';
    list.appendChild(div);
  });
  var cnt=document.getElementById('shop-count');
  if(cnt) cnt.textContent=cache.shopping.filter(function(s){return s.bought;}).length+' из '+cache.shopping.length+' куплено';
}
async function addShop(){
  var name=document.getElementById('s-name').value.trim();
  if(!name) return;
  var res=await sb.from('shopping').insert({
    user_id:user.id,
    name:name,
    qty:document.getElementById('s-qty').value.trim()||null,
    bought:false
  }).select().single();
  if(res.data){
    cache.shopping.push(res.data);
    document.getElementById('s-name').value='';
    document.getElementById('s-qty').value='';
    renderShop();
  }
}
async function toggleShop(id){
  var s=cache.shopping.find(function(s){return s.id===id;});
  if(!s) return;
  s.bought=!s.bought;
  await sb.from('shopping').update({bought:s.bought}).eq('id',id);
  renderShop();
}
async function delShop(id){
  await sb.from('shopping').delete().eq('id',id);
  cache.shopping=cache.shopping.filter(function(s){return s.id!==id;});
  renderShop();
}
async function clearBought(){
  var ids=cache.shopping.filter(function(s){return s.bought;}).map(function(s){return s.id;});
  if(!ids.length) return;
  await sb.from('shopping').delete().in('id',ids);
  cache.shopping=cache.shopping.filter(function(s){return !s.bought;});
  renderShop();
}

// STATS
function renderStats(){
  var td=today();
  var scored=Object.entries(cache.days).filter(function(kv){return kv[1].cats&&kv[0]<=td;});
  var avgs=scored.map(function(kv){return calcAvg(kv[1]);});
  var total=scored.length;
  var overall=total?Math.round(avgs.reduce(function(a,b){return a+b;},0)/avgs.length):0;
  var great=avgs.filter(function(a){return a>=80;}).length;
  var good=avgs.filter(function(a){return a>=60&&a<80;}).length;
  var mid=avgs.filter(function(a){return a>=40&&a<60;}).length;
  var low=avgs.filter(function(a){return a<40;}).length;
  var sg=document.getElementById('stats-grid');
  if(sg){
    sg.innerHTML=
      '<div class="sm"><div class="sm-n">'+total+'</div><div class="sm-l">дней</div></div>'+
      '<div class="sm"><div class="sm-n" style="color:#a78bfa">'+overall+'%</div><div class="sm-l">средний</div></div>'+
      '<div class="sm"><div class="sm-n" style="color:#34d399">'+great+'</div><div class="sm-l">&ge;80%</div></div>'+
      '<div class="sm"><div class="sm-n" style="color:#818cf8">'+good+'</div><div class="sm-l">60-79%</div></div>'+
      '<div class="sm"><div class="sm-n" style="color:#f472b6">'+mid+'</div><div class="sm-l">40-59%</div></div>'+
      '<div class="sm"><div class="sm-n" style="color:#fb923c">'+low+'</div><div class="sm-l">&lt;40%</div></div>';
  }
  var cs=document.getElementById('cat-stats');
  if(cs){
    cs.innerHTML='';
    CATS_DAY.forEach(function(cat){
      var vals=scored.map(function(kv){return Number(kv[1].cats[cat.id])||0;});
      var avg=vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):0;
      var row=document.createElement('div');
      row.className='bar-row';
      row.innerHTML='<span style="font-size:11px;color:'+cat.color+';width:56px;flex-shrink:0">'+cat.name+'</span>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+avg+'%;background:'+cat.color+'"></div></div>'+
        '<span class="bar-val" style="color:'+cat.color+'">'+avg+'%</span>';
      cs.appendChild(row);
    });
  }
}

// LOAD ALL DATA
async function loadAll(){
  if(!user) return;
  var uid=user.id;
  var results=await Promise.all([
    sb.from('days').select('*').eq('user_id',uid),
    sb.from('habits').select('*').eq('user_id',uid).order('created_at'),
    sb.from('habit_logs').select('*').eq('user_id',uid),
    sb.from('finance_settings').select('*').eq('user_id',uid).maybeSingle(),
    sb.from('expenses').select('*').eq('user_id',uid),
    sb.from('goals').select('*').eq('user_id',uid).order('created_at'),
    sb.from('todos').select('*').eq('user_id',uid).order('created_at'),
    sb.from('shopping').select('*').eq('user_id',uid).order('created_at')
  ]);
  cache.days={};
  (results[0].data||[]).forEach(function(r){cache.days[r.date]={cats:r.cats,dbId:r.id};});
  cache.habits=results[1].data||[];
  cache.habitLogs={};
  (results[2].data||[]).forEach(function(r){
    if(!cache.habitLogs[r.habit_id]) cache.habitLogs[r.habit_id]={};
    cache.habitLogs[r.habit_id][r.date]={done:r.done,dbId:r.id};
  });
  if(results[3].data) cache.fin=results[3].data;
  cache.expenses={};
  (results[4].data||[]).forEach(function(r){cache.expenses[r.date]={cats:r.cats,dbId:r.id};});
  cache.goals=(results[5].data||[]).map(function(r){return Object.assign({},r,{tasks:r.tasks||[]});});
  cache.todos=results[6].data||[];
  cache.shopping=results[7].data||[];
}

// INIT APP
async function initApp(u){
  user=u;
  await loadAll();
  document.getElementById('loading').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  SECTIONS.filter(function(n){return n!=='days';}).forEach(function(n){
    var el=document.getElementById('tab-'+n);
    if(el) el.style.display='none';
  });
  renderGrid();
}

// BOOT
(async function(){
  try{
    sb=supabase.createClient(SURL,SKEY);
    var sessionRes=await sb.auth.getSession();
    if(sessionRes.data&&sessionRes.data.session){
      await initApp(sessionRes.data.session.user);
    }else{
      document.getElementById('loading').style.display='none';
      document.getElementById('auth-screen').style.display='flex';
    }
    sb.auth.onAuthStateChange(async function(event,session){
      if(event==='SIGNED_IN'&&session&&!user){
        document.getElementById('loading').innerHTML='<div class="spin"></div><span>Загрузка...</span>';
        document.getElementById('loading').style.display='flex';
        document.getElementById('auth-screen').style.display='none';
        await initApp(session.user);
      }else if(event==='SIGNED_OUT'){
        user=null;
        cache={days:{},habits:[],habitLogs:{},fin:{budget_uah:0,budget_usd:0,rate:41.5,currency:'UAH',fixed_costs:[]},expenses:{},goals:[],todos:[],shopping:[]};
        document.getElementById('app').style.display='none';
        document.getElementById('auth-screen').style.display='flex';
      }
    });
  }catch(e){
    var ld=document.getElementById('loading');
    ld.innerHTML='<span style="color:#f87171;padding:20px">Ошибка: '+e.message+'</span>';
    console.error(e);
  }
})();

document.addEventListener('keydown',function(e){
  if(e.key!=='Enter') return;
  var id=document.activeElement.id;
  if(id==='t-text') addTask();
  else if(id==='s-name') addShop();
  else if(id==='new-habit') addHabit();
  else if(id==='g-title') addGoal();
  else if(id==='ap') doAuth();
});
</script>
